<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }

      .prompt { fill: #3fb950; }
      .cmd    { fill: #c9d1d9; }
      .dir    { fill: #79c0ff; }
      .repo   { fill: #d2a8ff; }
      .lang-js   { fill: #f0883e; }
      .lang-py   { fill: #3fb950; }
      .lang-html { fill: #e34c26; }
      .dim    { fill: #484f58; }
      .white  { fill: #c9d1d9; }
      .blue   { fill: #58a6ff; }
      .star   { fill: #e3b341; }
      .info-key { fill: #58a6ff; font-weight: 700; }
      .info-val { fill: #c9d1d9; }
      .ascii  { fill: #1793D1; }
      .user   { fill: #3fb950; font-weight: 700; }
      .at     { fill: #8b949e; }
      .host   { fill: #3fb950; font-weight: 700; }

      /* typing cursor blink */
      .cursor { fill: #c9d1d9; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* fade-in groups with staggered delays */
      .g0  { opacity:0; animation: fadein 0.3s 0.2s forwards; }
      .g1  { opacity:0; animation: fadein 0.3s 1.8s forwards; }
      .g2  { opacity:0; animation: fadein 0.3s 2.4s forwards; }
      .g3  { opacity:0; animation: fadein 0.3s 3.5s forwards; }
      .g4  { opacity:0; animation: fadein 0.3s 4.1s forwards; }
      .g5  { opacity:0; animation: fadein 0.3s 5.2s forwards; }
      .g6  { opacity:0; animation: fadein 0.3s 5.8s forwards; }
      .g7  { opacity:0; animation: fadein 0.3s 6.9s forwards; }
      .g8  { opacity:0; animation: fadein 0.3s 7.5s forwards; }
      .g9  { opacity:0; animation: fadein 0.3s 8.6s forwards; }
      .g10 { opacity:0; animation: fadein 0.3s 9.2s forwards; }
      .g11 { opacity:0; animation: fadein 0.3s 10.3s forwards; }
      .g12 { opacity:0; animation: fadein 0.3s 10.9s forwards; }

      @keyframes fadein { to { opacity:1; } }

      /* typing effect for commands */
      .type1 { animation: typing1 0.5s 1.8s steps(10,end) both; }
      .type2 { animation: typing2 0.3s 3.5s steps(3,end) both; }
      .type3 { animation: typing3 0.6s 5.2s steps(12,end) both; }
      .type4 { animation: typing4 0.5s 6.9s steps(10,end) both; }
      .type5 { animation: typing5 0.6s 8.6s steps(12,end) both; }
      .type6 { animation: typing6 0.8s 10.3s steps(16,end) both; }

      @keyframes typing1 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes typing2 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes typing3 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes typing4 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes typing5 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
      @keyframes typing6 { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    </style>

    <!-- rounded rect clip for whole terminal -->
    <clipPath id="termclip">
      <rect width="800" height="520" rx="12"/>
    </clipPath>
  </defs>

  <!-- terminal bg -->
  <rect width="800" height="520" rx="12" fill="#0d1117"/>

  <!-- title bar -->
  <rect width="800" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="800" height="12" fill="#161b22"/>
  <rect y="40" width="800" height="1" fill="#30363d"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="400" y="25" text-anchor="middle" font-size="12" fill="#484f58">mehmetsolves@arch — bash — 80x24</text>

  <g clip-path="url(#termclip)">

  <!-- ── NEOFETCH BLOCK ── -->
  <g class="g0">
    <!-- Arch ASCII art -->
    <text x="60"  y="80"  font-size="13" class="ascii">        /\</text>
    <text x="60"  y="96"  font-size="13" class="ascii">       /  \</text>
    <text x="60"  y="112" font-size="13" class="ascii">      / /\ \</text>
    <text x="60"  y="128" font-size="13" class="ascii">     / /  \ \</text>
    <text x="60"  y="144" font-size="13" class="ascii">    / / /\ \ \</text>
    <text x="60"  y="160" font-size="13" class="ascii">   /_/ /  \_\/</text>
    <text x="60"  y="176" font-size="13" class="ascii">  /_/           </text>

    <!-- user@host -->
    <text x="230" y="82" font-size="14" class="user">mehmetsolves</text>
    <text x="370" y="82" font-size="14" class="at">@</text>
    <text x="382" y="82" font-size="14" class="host">github</text>
    <!-- separator -->
    <text x="230" y="98" font-size="13" class="dim">──────────────────────────</text>
    <!-- info rows -->
    <text x="230" y="116" font-size="13" class="info-key">OS        </text><text x="360" y="116" font-size="13" class="info-val">Arch Linux x86_64</text>
    <text x="230" y="132" font-size="13" class="info-key">Shell     </text><text x="360" y="132" font-size="13" class="info-val">zsh 5.9</text>
    <text x="230" y="148" font-size="13" class="info-key">Editor    </text><text x="360" y="148" font-size="13" class="info-val">neovim</text>
    <text x="230" y="164" font-size="13" class="info-key">Repos     </text><text x="360" y="164" font-size="13" class="info-val">10 public</text>
    <text x="230" y="180" font-size="13" class="info-key">Stars     </text><text x="360" y="180" font-size="13" class="star">★★★★</text>
    <!-- color dots -->
    <rect x="230" y="192" width="18" height="18" rx="3" fill="#ff5f57"/>
    <rect x="254" y="192" width="18" height="18" rx="3" fill="#febc2e"/>
    <rect x="278" y="192" width="18" height="18" rx="3" fill="#28c840"/>
    <rect x="302" y="192" width="18" height="18" rx="3" fill="#1793D1"/>
    <rect x="326" y="192" width="18" height="18" rx="3" fill="#d2a8ff"/>
    <rect x="350" y="192" width="18" height="18" rx="3" fill="#79c0ff"/>
    <rect x="374" y="192" width="18" height="18" rx="3" fill="#484f58"/>
  </g>

  <!-- divider -->
  <line x1="40" y1="225" x2="760" y2="225" stroke="#21262d" stroke-width="1" class="g0"/>

  <!-- ── CMD: ls ── -->
  <!-- prompt line -->
  <g class="g1">
    <text x="40" y="250" font-size="13" class="prompt">mehmetsolves@arch</text>
    <text x="195" y="250" font-size="13" class="dim"> ~ $</text>
  </g>
  <g class="g1" style="clip-path:inset(0 0 0 0)">
    <text x="228" y="250" font-size="13" class="cmd type1"> ls</text>
  </g>

  <!-- ls output -->
  <g class="g2">
    <text x="40"  y="270" font-size="13" class="dir">GeoPlayer/</text>
    <text x="160" y="270" font-size="13" class="dir">haven/</text>
    <text x="248" y="270" font-size="13" class="dir">MektepPy/</text>
    <text x="370" y="270" font-size="13" class="dir">AYAP/</text>
    <text x="448" y="270" font-size="13" class="dir">Fast-voice-asistant/</text>
  </g>

  <!-- ── CMD: cat GeoPlayer ── -->
  <g class="g3">
    <text x="40" y="300" font-size="13" class="prompt">mehmetsolves@arch</text>
    <text x="195" y="300" font-size="13" class="dim"> ~ $</text>
    <text x="228" y="300" font-size="13" class="cmd type3"> cat GeoPlayer</text>
  </g>
  <!-- output box -->
  <g class="g4">
    <rect x="40" y="308" width="720" height="46" rx="4" fill="#161b22"/>
    <rect x="40" y="308" width="3" height="46" rx="2" fill="#1793D1"/>
    <text x="54" y="326" font-size="13" class="repo">GeoPlayer</text>
    <text x="144" y="326" font-size="11" class="lang-js"> JavaScript</text>
    <text x="240" y="326" font-size="13" class="star"> ★ 2</text>
    <text x="54" y="344" font-size="12" class="white">Coğrafi verilerle çalışan interaktif bir oynatıcı.</text>
    <text x="490" y="344" font-size="11" class="dim">→ gity-21/GeoPlayer</text>
  </g>

  <!-- ── CMD: cat AYAP ── -->
  <g class="g5">
    <text x="40" y="368" font-size="13" class="prompt">mehmetsolves@arch</text>
    <text x="195" y="368" font-size="13" class="dim"> ~ $</text>
    <text x="228" y="368" font-size="13" class="cmd type4"> cat AYAP</text>
  </g>
  <g class="g6">
    <rect x="40" y="376" width="720" height="46" rx="4" fill="#161b22"/>
    <rect x="40" y="376" width="3" height="46" rx="2" fill="#1793D1"/>
    <text x="54" y="394" font-size="13" class="repo">AYAP</text>
    <text x="110" y="394" font-size="11" class="lang-js"> JavaScript</text>
    <text x="206" y="394" font-size="13" class="star"> ★ 1</text>
    <text x="54" y="412" font-size="12" class="white">Açık kaynaklı bir proje — gity-21 organizasyonu altında.</text>
    <text x="490" y="412" font-size="11" class="dim">→ gity-21/AYAP</text>
  </g>

  <!-- ── CMD: cat MektepPy ── -->
  <g class="g7">
    <text x="40" y="436" font-size="13" class="prompt">mehmetsolves@arch</text>
    <text x="195" y="436" font-size="13" class="dim"> ~ $</text>
    <text x="228" y="436" font-size="13" class="cmd type5"> cat MektepPy</text>
  </g>
  <g class="g8">
    <rect x="40" y="444" width="720" height="46" rx="4" fill="#161b22"/>
    <rect x="40" y="444" width="3" height="46" rx="2" fill="#e34c26"/>
    <text x="54" y="462" font-size="13" class="repo">MektepPy</text>
    <text x="154" y="462" font-size="11" class="lang-html"> HTML</text>
    <text x="54" y="480" font-size="12" class="white">Eğitim odaklı bir web projesi.</text>
    <text x="490" y="480" font-size="11" class="dim">→ mehmetsolves/MektepPy</text>
  </g>

  <!-- ── CMD: cat Fast-voice-asistant ── -->
  <g class="g9">
    <text x="40" y="504" font-size="13" class="prompt">mehmetsolves@arch</text>
    <text x="195" y="504" font-size="13" class="dim"> ~ $</text>
    <text x="228" y="504" font-size="13" class="cmd type6"> cat Fast-voice-asistant</text>
  </g>

  </g>
</svg>
